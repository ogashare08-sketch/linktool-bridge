<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linktool ブリッジ</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #e8eaed;
        background: #13151a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      main {
        max-width: 36rem;
      }
      p {
        margin: 0 0 0.75rem;
        font-size: 0.9rem;
        color: #9aa0a6;
      }
      code {
        font-size: 0.8rem;
        word-break: break-all;
        background: rgba(255, 255, 255, 0.08);
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
      button {
        font: inherit;
        margin-top: 0.75rem;
        padding: 0.55rem 1rem;
        border-radius: 8px;
        border: 1px solid rgba(138, 180, 248, 0.45);
        background: #3a3f48;
        color: #e8eaed;
        cursor: pointer;
      }
      button:hover {
        background: #454b55;
      }
      .err {
        color: #f28b82;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p id="status">準備中…</p>
      <p id="detail"></p>
      <button type="button" id="openBtn" hidden>Linktool で開く</button>
    </main>
    <script>
      (function () {
        function buildLinktoolUrl(target) {
          return (
            "linktool://open?target=" + encodeURIComponent(target)
          );
        }

        function targetFromHash() {
          var h = window.location.hash;
          if (!h || h.length <= 1) return null;
          var raw = h.slice(1);
          try {
            return decodeURIComponent(raw);
          } catch (e) {
            return null;
          }
        }

        function tryOpen() {
          var t = targetFromHash();
          if (!t) return false;
          window.location.href = buildLinktoolUrl(t);
          return true;
        }

        var statusEl = document.getElementById("status");
        var detailEl = document.getElementById("detail");
        var btn = document.getElementById("openBtn");

        var target = targetFromHash();

        if (!target) {
          statusEl.textContent = "パスがありません";
          detailEl.innerHTML =
            'Notion などに貼る URL は次の形です:<br /><code>このページのURL#' +
            encodeURIComponent("\\\\サーバー\\共有\\フォルダ") +
            "</code><br />（# の後ろは <code>encodeURIComponent</code> したパス）";
          return;
        }

        statusEl.textContent = "Linktool を起動しています…";
        detailEl.innerHTML =
          "対象: <code>" +
          target.replace(/</g, "&lt;").replace(/>/g, "&gt;") +
          "</code>";

        btn.hidden = false;
        btn.onclick = function () {
          tryOpen();
        };

        // ページ表示直後にカスタム URL へ飛ばす（Notion からのクリック経路では多くの環境で通る）
        tryOpen();

        window.setTimeout(function () {
          statusEl.textContent =
            "うまく開かない場合は、下のボタンを押してください（PC に Linktool が入っている必要があります）。";
        }, 1200);
      })();
    </script>
  </body>
</html>
