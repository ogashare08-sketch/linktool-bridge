<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linktool ブリッジ</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #e8eaed;
        background: #13151a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      main {
        max-width: 36rem;
      }
      p {
        margin: 0 0 0.75rem;
        font-size: 0.9rem;
        color: #9aa0a6;
      }
      code {
        font-size: 0.8rem;
        word-break: break-all;
        background: rgba(255, 255, 255, 0.08);
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        margin-top: 0.35rem;
      }
      button {
        font: inherit;
        padding: 0.55rem 1rem;
        border-radius: 8px;
        border: 1px solid rgba(138, 180, 248, 0.45);
        background: #3a3f48;
        color: #e8eaed;
        cursor: pointer;
        text-align: left;
      }
      button:hover {
        background: #454b55;
      }
      button.secondary {
        border-color: rgba(129, 201, 149, 0.45);
      }
      button.secondary:hover {
        background: #3d4a42;
      }
      .note {
        font-size: 0.78rem;
        color: #80868b;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p id="status">準備中…</p>
      <p id="detail"></p>
      <div id="actions" class="actions"></div>
      <p id="footnote" class="note"></p>
    </main>
    <script>
      (function () {
        function base64UrlDecode(b64) {
          var s = b64.replace(/-/g, "+").replace(/_/g, "/");
          while (s.length % 4) s += "=";
          var bin = atob(s);
          var bytes = Uint8Array.from(bin, function (c) {
            return c.charCodeAt(0);
          });
          return new TextDecoder().decode(bytes);
        }

        function parseHashFragmentOnly(raw) {
          if (!raw) return null;
          if (raw.startsWith("v2:")) {
            try {
              var j = JSON.parse(base64UrlDecode(raw.slice(3)));
              if (j && j.localPath) {
                return { localPath: j.localPath, driveUrl: j.driveUrl || null };
              }
            } catch (e) {
              return null;
            }
            return null;
          }
          try {
            return { localPath: decodeURIComponent(raw), driveUrl: null };
          } catch (e2) {
            return null;
          }
        }

        /** ?path= / ?v2= を優先（Discord 等で # が落ちる対策）。無ければ # 以降。 */
        function parseBridgePayload() {
          var search = window.location.search;
          if (search && search.length > 1) {
            var params = new URLSearchParams(search.slice(1));
            var v2 = params.get("v2");
            if (v2) {
              var parsedV2 = parseHashFragmentOnly("v2:" + v2);
              if (parsedV2) return parsedV2;
            }
            var pathQ = params.get("path");
            if (pathQ && String(pathQ).trim()) {
              return { localPath: pathQ, driveUrl: null };
            }
          }
          var h = window.location.hash;
          if (h && h.length > 1) return parseHashFragmentOnly(h.slice(1));
          return null;
        }

        function buildLinktoolUrl(target) {
          return "linktool://open?target=" + encodeURIComponent(target);
        }

        function esc(s) {
          return String(s).replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        var statusEl = document.getElementById("status");
        var detailEl = document.getElementById("detail");
        var actionsEl = document.getElementById("actions");
        var footEl = document.getElementById("footnote");

        var parsed = parseBridgePayload();

        if (!parsed) {
          statusEl.textContent = "パスがありません";
          detailEl.innerHTML =
            'Notion に貼る URL の <code>#</code> 以降にパスまたは v2 ペイロードが必要です。';
          return;
        }

        detailEl.innerHTML = "ローカルパス: <code>" + esc(parsed.localPath) + "</code>";

        function openLocal() {
          window.location.href = buildLinktoolUrl(parsed.localPath);
        }

        function openDrive() {
          if (parsed.driveUrl) {
            window.open(parsed.driveUrl, "_blank", "noopener,noreferrer");
          }
        }

        if (parsed.driveUrl) {
          statusEl.textContent = "開き方を選んでください";
          actionsEl.innerHTML =
            '<button type="button" id="btnLocal">この PC で開く（Linktool・NAS など）</button>' +
            '<button type="button" class="secondary" id="btnDrive">Google Drive で見る／ダウンロード</button>';
          document.getElementById("btnLocal").onclick = openLocal;
          document.getElementById("btnDrive").onclick = openDrive;
          footEl.textContent =
            "ローカルに Linktool が無い場合や外出先では、Drive のリンクを使ってください。";
          return;
        }

        statusEl.textContent = "Linktool を起動しています…";
        actionsEl.innerHTML =
          '<button type="button" id="btnRetry">Linktool で開く（うまくいかないとき）</button>';
        document.getElementById("btnRetry").onclick = openLocal;

        window.location.href = buildLinktoolUrl(parsed.localPath);

        window.setTimeout(function () {
          statusEl.textContent =
            "開かないときは上のボタンを試すか、PC に Linktool をインストールしてください。Discord 等から開くときは「ブラウザで開く」推奨（アプリ内ブラウザで # が落ちることがあります）。";
        }, 1200);
      })();
    </script>
  </body>
</html>
